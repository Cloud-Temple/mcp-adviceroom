# ============================================================
# AdviceRoom Frontend — Nginx Configuration
# ============================================================
# Sert le build React en mode SPA (Single Page Application).
# Écoute sur le port 3000 (attendu par docker-compose + Caddyfile).
#
# Routing SPA : toutes les routes non-fichier retournent index.html
# (React gère le routing côté client).

server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compression gzip pour les assets
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    # Cache long pour les assets hashés (JS, CSS, images)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback : fichier existant → servir, sinon → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Désactiver les logs pour le favicon (évite du bruit)
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }
}
